# check-cloud-agent 配置
# =======================
# 将此文件复制到 ~/.config/skills/check-cloud-agent.yaml 并填入实际值。
# 全局路径是主配置位置；skill 目录下的 config.yaml 仅在全局文件不存在时作为回退。
#
# 所有标记 [必填] 的字段必须填写 —— 若必填字段缺失或仍为示例值，skill 将中止并提示缺少哪些字段。
# 标记 [可选] 的字段可保留原样或整块删除；对应字段缺失时 skill 跳过相关检查。

# ----- 部署标识 -----------------------------------------------------------
deployments:
  - id: "example-deployment"          # [必填] 唯一标识，如 "prod-aone"
    display_name: "Example Deployment" # [必填] 报告中显示的可读名称
    user_email: "you@example.com"     # [必填] 部署负责人邮箱

    # ----- 服务器连接 -----------------------------------------------------
    server:
      ip: "1.2.3.4"                  # [必填] 目标服务器公网 IPv4
      ssh_user: "root"               # [必填] SSH 登录用户（通常为 "root"）
      ssh_identity_file: "~/.ssh/id_ed25519" # [必填] SSH 私钥路径
      install_dir: "/opt/myapp"      # [必填] 服务器上的应用根目录

    # ----- OpenClaw agent（旧版 ClawSimple agent）-------------------------
    openclaw:
      state_dir: "/opt/myapp/.openclaw"  # [必填] OpenClaw 状态/配置目录
      agent_name: "my-agent"             # [必填] openclaw.json 中的 agent 名称

    # ----- Hermes agent（新版 agent 运行时）-------------------------------
    hermes:
      home_dir: "/opt/myapp/.hermes/main"                # [必填] HERMES_HOME 目录（含 config.yaml、auth.json、.env、cron/）
      agent_dir: "/opt/myapp/.hermes-agent/hermes-agent" # [必填] Hermes-agent 安装目录（含 venv/、run_agent.py）
      gateway_service: "hermes-gateway-main.service"     # [必填] Hermes gateway 对应的 systemd 服务名
      agent_display_name: "My Agent"                     # [必填] 报告和触发规则中使用的显示名称

    # ----- 远程桌面（通过 SSH 隧道访问 noVNC）-----------------------------
    remote_desktop:                   # [可选] 如不使用远程桌面可删除整块
      local_host: "127.0.0.1"        # 本机 loopback 地址
      local_port: 6080               # SSH 隧道本机端口（需空闲）
      remote_host: "127.0.0.1"       # 服务器端 noVNC 监听地址（必须为 loopback）
      remote_port: 6080              # 服务器端 noVNC 监听端口
      path: "/vnc.html"              # noVNC 页面的 URL 路径

    # ----- Telegram 频道与群组 -------------------------------------------
    telegram:
      home_channel_id: "-1001234567890"    # [必填] agent 归属 Telegram 频道的 chat ID
      home_channel_name: "My Home Channel" # [必填] home channel 可读名称
      support_group_name: "My Support Group"    # [必填] support 讨论群名称
      support_group_chat_id: "-1009876543210"   # [必填] support 群 chat ID

    # ----- 本地仓库 -------------------------------------------------------
    local_repo: "~/Projects/myapp"   # [必填] 部署仓库的本地 checkout 路径
